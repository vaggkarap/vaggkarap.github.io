<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Βαθμοί Πανεπιστημίου</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="uniwa-1.png">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle-btn">🌙 Dark Mode</button>

    <div class="container" id="loginScreen">
        <div style="display: inline-block; padding: 10px; border-radius: 10px; margin-bottom: 20px;">
            <img src="uniwa-logo.png" id="uniwaLogin" alt="Λογότυπο" width="300">
        </div>
        <h2>Καλώς Ήρθατε</h2>
        <p>Συνδεθείτε για να δείτε τους βαθμούς σας</p>
        
        <div class="auth-form">
            <input type="email" id="emailInput" placeholder="Το Email σας" required>
            <input type="password" id="passwordInput" placeholder="Ο Κωδικός σας (min. 6 χαρακτήρες)" required>
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button onclick="loginUser()" style="background-color: #2980b9; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Σύνδεση</button>
                <button onclick="registerUser()" style="background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Εγγραφή</button>
            </div>
            <div style="margin-top: 15px;">
                <a href="#" onclick="resetPassword()" style="color: #34495e; font-size: 13px; text-decoration: none;">Ξέχασα τον κωδικό μου</a>
            </div>
        </div>
    </div>


    <div class="container" id="appScreen" style="display: none;">
        
        <div style="text-align: right; margin-bottom: 10px;">
            <span id="userEmailDisplay" style="font-size: 14px; color: #7f8c8d; margin-right: 15px;"></span>
            <button onclick="logoutUser()" style="background-color: #e74c3c; color: white; border: none; padding: 5px 10px; font-size: 14px; border-radius: 5px; cursor: pointer;">Αποσύνδεση</button>
        </div>

        <div style="display: inline-block; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
            <img src="uniwa-logo.png" name="uniwa" id="uniwa" width="500" height="150" alt="Λογότυπο Πανεπιστημίου">
        </div>
        <h1>Διαχείριση Βαθμών</h1>
        
        <div class="input-selection">
            <input type="text" id="course" placeholder="Όνομα Μαθήματος">
            <input type="number" id="theoryGrade" placeholder="Θεωρία (0-10)" min="0" max="10" step="0.1">
            <input type="number" id="labGrade" placeholder="Εργαστήριο (προαιρετικό)" min="0" max="10" step="0.1">
            <input type="number" id="finalGrade" placeholder="Τελικός Βαθμός" min="0" max="10" step="0.1">
            <input type="number" id="semester" placeholder="Εξάμηνο" min="1" max="10" step="1">
            <button id="mainBtn" onclick="saveGrade()">Προσθήκη</button>
        </div>

        <div class="semester-filter">
            <button class="filter-btn active" id="btn-filter-all" onclick="setSemesterFilter('all')">Όλα</button>
            <button class="filter-btn" id="btn-filter-1" onclick="setSemesterFilter(1)">1ο</button>
            <button class="filter-btn" id="btn-filter-2" onclick="setSemesterFilter(2)">2ο</button>
            <button class="filter-btn" id="btn-filter-3" onclick="setSemesterFilter(3)">3ο</button>
            <button class="filter-btn" id="btn-filter-4" onclick="setSemesterFilter(4)">4ο</button>
            <button class="filter-btn" id="btn-filter-5" onclick="setSemesterFilter(5)">5ο</button>
            <button class="filter-btn" id="btn-filter-6" onclick="setSemesterFilter(6)">6ο</button>
            <button class="filter-btn" id="btn-filter-7" onclick="setSemesterFilter(7)">7ο</button>
            <button class="filter-btn" id="btn-filter-8" onclick="setSemesterFilter(8)">8ο</button>
            <button class="filter-btn" id="btn-filter-9" onclick="setSemesterFilter(9)">9ο</button>
            <button class="filter-btn" id="btn-filter-10" onclick="setSemesterFilter(10)">10ο</button>
        </div>

        <div class="controls-section" style="display: flex; gap: 10px;">
            <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="🔍 Αναζήτηση..." style="flex: 2;">
            <select id="sortSelect" onchange="setSortMethod(this.value)" style="flex: 1; cursor: pointer;">
                <option value="semester_asc">⬇️ Εξάμηνο (1-10)</option>
                <option value="semester_desc">⬆️ Εξάμηνο (10-1)</option>
                <option value="final_desc">🏆 Τελικός Βαθμός (Υψηλότερος)</option>
                <option value="final_asc">📉 Τελικός Βαθμός (Χαμηλότερος)</option>
                <option value="name_asc">🔤 Όνομα (Α - Ω)</option>
            </select>
        </div>

        <table id="gradesTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Θεωρία</th>
                    <th>Εργαστήριο</th>
                    <th>Τελικός Βαθμός</th>
                    <th>Εξάμηνο</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="average-section">
            <h3>Μέσος όρος: <span id="averageSpan">-</span></h3>
        </div>

        <div class="backup-section">
            <button class="backup-btn export" onclick="exportToFile()">💾 Εξαγωγή σε Excel</button>
            <label for="importFile" class="backup-btn import">📂 Φόρτωση από Excel</label>
            <input type="file" id="importFile" accept=".csv" style="display:none" onchange="importFromFile(event)">
        </div>

    </div>

    <button id="backToTop" onclick="scrollToTop()" title="Πίσω στην κορυφή">⬆️</button>

    <script>
        // ==========================================
        // ΛΟΓΙΚΗ ΓΙΑ ΤΟ DARK THEME (ΕΝΗΜΕΡΩΜΕΝΗ ΓΙΑ ΕΙΚΟΝΕΣ)
        // ==========================================
        function initTheme() {
            const savedTheme = localStorage.getItem('appTheme');
            const themeBtn = document.getElementById('themeToggle');
            const logoLogin = document.getElementById('uniwaLogin');
            const logoApp = document.getElementById('uniwa');

            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                themeBtn.innerText = '☀️ Light Mode';
                if (logoLogin) logoLogin.src = "uniwa-dark.png";
                if (logoApp) logoApp.src = "uniwa-dark.png";
            } else {
                if (logoLogin) logoLogin.src = "uniwa-logo.png";
                if (logoApp) logoApp.src = "uniwa-logo.png";
            }
        }

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            const logoLogin = document.getElementById('uniwaLogin');
            const logoApp = document.getElementById('uniwa');

            body.classList.toggle('dark-theme');
            
            if (body.classList.contains('dark-theme')) {
                localStorage.setItem('appTheme', 'dark');
                themeBtn.innerText = '☀️ Light Mode';
                if (logoLogin) logoLogin.src = "uniwa-dark.png";
                if (logoApp) logoApp.src = "uniwa-dark.png";
            } else {
                localStorage.setItem('appTheme', 'light');
                themeBtn.innerText = '🌙 Dark Mode';
                if (logoLogin) logoLogin.src = "uniwa-logo.png";
                if (logoApp) logoApp.src = "uniwa-logo.png";
            }
        }
        
        document.addEventListener('DOMContentLoaded', initTheme);

        // ==========================================
        // 1. ΡΥΘΜΙΣΕΙΣ FIREBASE 
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCgdS2DvO1yUksP9FiAxWpvUJsJbv4pSmE", 
            authDomain: "universitygrades-58ed7.firebaseapp.com",
            projectId: "universitygrades-58ed7",
            storageBucket: "universitygrades-58ed7.firebasestorage.app",
            messagingSenderId: "403775984431",
            appId: "1:403775984431:web:e37a5618870f985ffe87da",
            measurementId: "G-4738X1ER9F"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let globalGrades = [];
        let currentEditId = null;
        let currentSemesterFilter = 'all'; 
        let currentSortMethod = 'semester_asc';

        // ==========================================
        // 2. ΣΥΣΤΗΜΑ ΧΡΗΣΤΩΝ (AUTH)
        // ==========================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('userEmailDisplay').innerText = user.email;
                fetchGradesFromDB();
            } else {
                currentUser = null;
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        function registerUser() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then((u) => u.user.sendEmailVerification().then(() => alert("Η εγγραφή πέτυχε! Σας έχει σταλεί email.")))
                .catch((e) => alert("Σφάλμα: " + e.message));
        }

        function loginUser() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.signInWithEmailAndPassword(email, pass).catch((e) => alert("Λάθος email ή κωδικός!"));
        }

        function logoutUser() { auth.signOut(); }

        function resetPassword() {
            const email = document.getElementById('emailInput').value;
            if (!email) { alert("Παρακαλώ συμπληρώστε πρώτα το email σας."); return; }
            auth.sendPasswordResetEmail(email)
                .then(() => alert("Σας στείλαμε email. Ελέγξτε και τα Spam!"))
                .catch((e) => alert("Σφάλμα: " + e.message));
        }

        // ==========================================
        // 3. ΒΑΣΗ ΔΕΔΟΜΕΝΩΝ (FIRESTORE)
        // ==========================================
        function fetchGradesFromDB() {
            db.collection("users").doc(currentUser.uid).collection("grades")
              .onSnapshot((querySnapshot) => {
                  globalGrades = [];
                  querySnapshot.forEach((doc) => {
                      let data = doc.data();
                      data.id = doc.id; 
                      globalGrades.push(data);
                  });
                  renderTable(); 
              });
        }

        function saveGrade() {
            const nameInput = document.getElementById("course").value;
            const theoryInput = document.getElementById("theoryGrade").value;
            const labInput = document.getElementById("labGrade").value; // Προαιρετικό
            const finalInput = document.getElementById("finalGrade").value;
            const semesterInput = document.getElementById("semester").value;

            // Έλεγχος ότι τα υποχρεωτικά πεδία έχουν συμπληρωθεί
            if(!nameInput || !theoryInput || !finalInput || !semesterInput) {
                alert("Συμπληρώστε τουλάχιστον: Όνομα, Θεωρία, Τελικό Βαθμό και Εξάμηνο!"); return;
            }

            const gradeData = {
                name: nameInput,
                theory: parseFloat(theoryInput),
                lab: labInput ? parseFloat(labInput) : null, // Αν είναι κενό, αποθηκεύεται ως null
                final: parseFloat(finalInput),
                semester: parseInt(semesterInput)
            };

            const userGradesRef = db.collection("users").doc(currentUser.uid).collection("grades");

            if (currentEditId === null) {
                userGradesRef.add(gradeData);
            } else {
                userGradesRef.doc(currentEditId).update(gradeData);
                currentEditId = null;
                document.getElementById("mainBtn").innerText = "Προσθήκη";
            }

            // Καθαρισμός Πεδίων
            document.getElementById("course").value = "";
            document.getElementById("theoryGrade").value = "";
            document.getElementById("labGrade").value = "";
            document.getElementById("finalGrade").value = "";
            document.getElementById("semester").value = "";
        }

        function editGrade(docId) {
            const entry = globalGrades.find(g => g.id === docId);
            if(entry) {
                document.getElementById("course").value = entry.name;
                document.getElementById("theoryGrade").value = entry.theory;
                document.getElementById("labGrade").value = entry.lab !== null ? entry.lab : "";
                document.getElementById("finalGrade").value = entry.final;
                document.getElementById("semester").value = entry.semester;
                
                currentEditId = docId;
                document.getElementById("mainBtn").innerText = "Αποθήκευση";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deleteGrade(docId) {
            if(confirm("Σίγουρα θέλετε να διαγράψετε το μάθημα;")) {
                db.collection("users").doc(currentUser.uid).collection("grades").doc(docId).delete();
            }
        }

        // ==========================================
        // 4. ΕΜΦΑΝΙΣΗ & ΥΠΟΛΟΓΙΣΜΟΙ
        // ==========================================
        function setSemesterFilter(sem) {
            currentSemesterFilter = sem;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-filter-' + sem).classList.add('active');
            renderTable();
        }

        function setSortMethod(method) {
            currentSortMethod = method;
            renderTable();
        }

        // Βοηθητική συνάρτηση για να δίνει το σωστό χρώμα (πράσινο/κόκκινο)
        function getColorClass(value) {
            if (value === null || value === undefined || value === "") return ""; // Χωρίς χρώμα αν είναι κενό
            return value >= 5 ? "grade-pass" : "grade-fail";
        }

        // Βοηθητική συνάρτηση για να εμφανίζει παύλα (-) αντί για κενό
        function displayVal(value) {
            return (value === null || value === undefined || value === "") ? "-" : value;
        }

        function renderTable() {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";

            let displayList = [...globalGrades];

            if (currentSemesterFilter !== 'all') {
                displayList = displayList.filter(entry => entry.semester === currentSemesterFilter);
            }

            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            if (searchQuery) {
                displayList = displayList.filter(entry => entry.name.toLowerCase().includes(searchQuery));
            }

            // Η Ταξινόμηση πλέον γίνεται με βάση τον ΤΕΛΙΚΟ ΒΑΘΜΟ (final)
            displayList.sort((a, b) => {
                if (currentSortMethod === 'semester_asc') return a.semester - b.semester;
                if (currentSortMethod === 'semester_desc') return b.semester - a.semester;
                if (currentSortMethod === 'final_desc') return b.final - a.final;
                if (currentSortMethod === 'final_asc') return a.final - b.final;
                if (currentSortMethod === 'name_asc') return a.name.localeCompare(b.name, 'el');
                return 0;
            });

            let passedSum = 0, passedCount = 0;

            displayList.forEach(entry => {
                // Ο Μέσος Όρος υπολογίζεται ΜΟΝΟ από τον Τελικό Βαθμό
                if (entry.final >= 5) {
                    passedSum += entry.final;
                    passedCount++;            
                }
                
                let row = `<tr>
                                <td>${entry.name}</td>
                                <td class="${getColorClass(entry.theory)}">${displayVal(entry.theory)}</td>
                                <td class="${getColorClass(entry.lab)}">${displayVal(entry.lab)}</td>
                                <td class="${getColorClass(entry.final)}">${displayVal(entry.final)}</td>
                                <td>${entry.semester}</td>
                                <td>
                                    <button class="edit-btn" onclick="editGrade('${entry.id}')">Επεξεργασία</button>
                                    <button class="delete-btn" onclick="deleteGrade('${entry.id}')">Διαγραφή</button>
                                </td>
                            </tr>`;
                tableBody.innerHTML += row;
            });

            if (passedCount > 0) {
                document.getElementById("averageSpan").innerText = (passedSum / passedCount).toFixed(2);
            } else {
                document.getElementById("averageSpan").innerText = "-";
            }
        }

        // ==========================================
        // 5. EXCEL (CSV) - Ενημερωμένο με τις νέες στήλες
        // ==========================================
        function exportToFile() {
            if (globalGrades.length === 0) { alert("Δεν υπάρχουν βαθμοί!"); return; }
            let csvContent = "Μάθημα,Θεωρία,Εργαστήριο,Τελικός,Εξάμηνο\n";
            globalGrades.forEach(entry => {
                let safeName = entry.name.includes(',') ? `"${entry.name}"` : entry.name;
                let labStr = entry.lab !== null ? entry.lab : "";
                csvContent += `${safeName},${entry.theory},${labStr},${entry.final},${entry.semester}\n`;
            });
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "vathmoi_excel.csv";
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        async function importFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const lines = e.target.result.split('\n');
                    let newGrades = [];
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue; 
                        const parts = line.split(',');
                        let nameStr = parts[0].replace(/(^"|"$)/g, ''); 
                        let theoryNum = parseFloat(parts[1]);
                        let labNum = parts[2] ? parseFloat(parts[2]) : null;
                        let finalNum = parseFloat(parts[3]);
                        let semesterNum = parseInt(parts[4]);
                        
                        if (nameStr && !isNaN(theoryNum) && !isNaN(finalNum) && !isNaN(semesterNum)) {
                            newGrades.push({ name: nameStr, theory: theoryNum, lab: labNum, final: finalNum, semester: semesterNum });
                        }
                    }
                    if (newGrades.length > 0) {
                        if(confirm("Προσοχή! Θα αντικατασταθούν οι παλιοί βαθμοί. Συνέχεια;")) {
                            const userGradesRef = db.collection("users").doc(currentUser.uid).collection("grades");
                            const batch = db.batch();
                            const snapshot = await userGradesRef.get();
                            snapshot.docs.forEach(doc => batch.delete(doc.ref));
                            newGrades.forEach(grade => batch.set(userGradesRef.doc(), grade));
                            await batch.commit();
                            alert("Οι βαθμοί φορτώθηκαν!");
                        }
                    } else { alert("Μη έγκυρο αρχείο."); }
                } catch (err) { alert("Σφάλμα ανάγνωσης."); }
            };
            reader.readAsText(file); event.target.value = ''; 
        }

        window.onscroll = function() {
            const topBtn = document.getElementById("backToTop");
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) topBtn.style.display = "block";
            else topBtn.style.display = "none";
        };
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Φοιτητικό Portal - UniWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="uniwa-1.png">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css" id="flatpickr-dark-theme" disabled>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/gr.js"></script>
</head>
<body>

    <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle-btn">🌙 Dark Mode</button>

    <header id="mainHeader" style="display: none;">
        <div class="header-left">
            <img src="uniwa-logo.png" id="headerLogo" alt="Logo">
        </div>
        <div class="header-center">
            <button class="nav-btn active" id="tabGrades" onclick="switchTab('grades')">Βαθμοί</button>
            <button class="nav-btn" id="tabTasks" onclick="switchTab('tasks')">Εργασίες</button>
            <button class="nav-btn" id="tabExams" onclick="switchTab('exams')">Εξετάσεις</button>
        </div>
        <div class="header-right">
            <span id="userEmailDisplay" style="font-size: 13px; font-weight: bold;"></span>
            <button onclick="logoutUser()" style="background-color:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Αποσύνδεση</button>
        </div>
    </header>

    <div class="container" id="loginScreen">
        <img src="uniwa-logo.png" id="uniwaLogin" alt="Logo" width="280" style="margin-bottom:20px;">
        <h2>Είσοδος στο Portal</h2>
        <div class="auth-form">
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Κωδικός">
            <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                <button onclick="loginUser()" style="background-color:#2980b9; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Σύνδεση</button>
                <button onclick="registerUser()" style="background-color:#27ae60; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Εγγραφή</button>
            </div>
            <p style="margin-top:15px;"><a href="#" onclick="resetPassword()" style="text-decoration:none; color:#7f8c8d; font-size:13px;">Ξέχασα τον κωδικό μου</a></p>
        </div>
    </div>

    <div class="container" id="appScreen" style="display: none;">
        <h1>Διαχείριση Βαθμών</h1>
        <div class="input-selection">
            <input type="text" id="course" placeholder="Όνομα Μαθήματος">
            <input type="number" id="theoryGrade" placeholder="Θεωρία (0-10)" step="0.1">
            <input type="number" id="labGrade" placeholder="Εργαστήριο" step="0.1">
            <input type="number" id="finalGrade" placeholder="Τελικός Βαθμός" step="0.1">
            <input type="number" id="semester" placeholder="Εξάμηνο">
            <button id="mainBtn" onclick="saveGrade()">Προσθήκη Βαθμού</button>
        </div>
        <div class="semester-filter">
            <button class="filter-btn active" id="btn-filter-all" onclick="setSemesterFilter('all')">Όλα</button>
            <button class="filter-btn" id="btn-filter-1" onclick="setSemesterFilter(1)">1ο</button>
            <button class="filter-btn" id="btn-filter-2" onclick="setSemesterFilter(2)">2ο</button>
            <button class="filter-btn" id="btn-filter-3" onclick="setSemesterFilter(3)">3ο</button>
            <button class="filter-btn" id="btn-filter-4" onclick="setSemesterFilter(4)">4ο</button>
            <button class="filter-btn" id="btn-filter-5" onclick="setSemesterFilter(5)">5ο</button>
            <button class="filter-btn" id="btn-filter-6" onclick="setSemesterFilter(6)">6ο</button>
            <button class="filter-btn" id="btn-filter-7" onclick="setSemesterFilter(7)">7ο</button>
            <button class="filter-btn" id="btn-filter-8" onclick="setSemesterFilter(8)">8ο</button>
            <button class="filter-btn" id="btn-filter-9" onclick="setSemesterFilter(9)">9ο</button>
            <button class="filter-btn" id="btn-filter-10" onclick="setSemesterFilter(10)">10ο</button>
        </div>
        <div class="controls-section">
            <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="🔍 Αναζήτηση..." style="flex: 2;">
            <select id="sortSelect" onchange="setSortMethod(this.value)" style="flex: 1; cursor: pointer;">
                <option value="semester_asc">⬇️ Εξάμηνο (1-10)</option>
                <option value="semester_desc">⬆️ Εξάμηνο (10-1)</option>
                <option value="final_desc">🏆 Τελικός Βαθμός (Υψηλότερος)</option>
                <option value="final_asc">📉 Τελικός Βαθμός (Χαμηλότερος)</option>
                <option value="name_asc">🔤 Όνομα (Α - Ω)</option>
            </select>
        </div>
        <table id="gradesTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Θεωρία</th>
                    <th>Εργαστήριο</th>
                    <th>Τελικός</th>
                    <th>Εξάμηνο</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div class="average-section">
            <h3>Μέσος όρος: <span id="averageSpan">-</span></h3>
        </div>
        <div class="backup-section">
            <button class="backup-btn export" onclick="exportToFile()">💾 Εξαγωγή σε Excel</button>
            <label for="importFile" class="backup-btn import">📂 Φόρτωση από Excel</label>
            <input type="file" id="importFile" accept=".csv" style="display:none" onchange="importFromFile(event)">
        </div>
    </div>

    <div class="container" id="tasksScreen" style="display: none;">
        <h1>Λίστα Εργασιών</h1>
        <div class="input-selection">
            <select id="taskCourseSelect">
                <option value="">Επιλέξτε Μάθημα...</option>
            </select>
            <select id="taskType">
                <option value="Θεωρία">Θεωρία</option>
                <option value="Εργαστήριο">Εργαστήριο</option>
            </select>
            <select id="taskStatus">
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
            <input type="text" id="taskDueDate" placeholder="Επιλέξτε Ημερομηνία...">
            <button id="mainBtnTask" onclick="saveTask()" style="margin-top: 10px; width: 100%; background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">Προσθήκη Εργασίας</button>
        </div>
        <table id="tasksTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Τύπος</th>
                    <th>Κατάσταση</th>
                    <th>Ημ. Παράδοσης</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody"></tbody>
        </table>
    </div>

    <div class="container" id="examsScreen" style="display: none;">
        <h1>Ημερολόγιο Εξετάσεων</h1>
        <div class="input-selection">
            <select id="examCourseSelect">
                <option value="">Επιλέξτε Μάθημα...</option>
            </select>
            <select id="examType">
                <option value="Θεωρία">Θεωρία</option>
                <option value="Εργαστήριο">Εργαστήριο</option>
            </select>
            <input type="text" id="examDateTime" placeholder="Ημερομηνία & Ώρα">
            <input type="text" id="examRoom" placeholder="Αίθουσα">
            <textarea id="examNotes" placeholder="Σημειώσεις (π.χ. SOS, Ύλη)..." style="width: 100%; margin-top: 10px; border-radius: 5px; padding: 10px; border: 1px solid #ccc; font-family: inherit;"></textarea>
            <button id="mainBtnExam" onclick="saveExam()" style="margin-top: 10px; width: 100%; background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">Προσθήκη Εξέτασης</button>
        </div>
        <table id="examsTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Τύπος</th> <th>Ημερομηνία & Ώρα</th>
                    <th>Αίθουσα</th>
                    <th>Σημειώσεις</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="examsTableBody"></tbody>
        </table>
    </div>

    <button id="backToTop" onclick="scrollToTop()" title="Επιστροφή στην κορυφή" style="display:none; position:fixed; bottom:20px; right:20px; padding:15px; border-radius:50%; background:#2c3e50; color:white; border:none; cursor:pointer; z-index:1000; width:50px; height:50px; font-size:18px;">↑</button>

    <script>
        // ==========================================
        // CONFIG & GLOBALS
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCgdS2DvO1yUksP9FiAxWpvUJsJbv4pSmE", 
            authDomain: "universitygrades-58ed7.firebaseapp.com",
            projectId: "universitygrades-58ed7",
            storageBucket: "universitygrades-58ed7.firebasestorage.app",
            messagingSenderId: "403775984431",
            appId: "1:403775984431:web:e37a5618870f985ffe87da"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let globalGrades = [];
        let globalTasks = [];
        let globalExams = [];
        let currentGradeEditId = null;
        let currentTaskEditId = null;
        let currentExamEditId = null;
        let currentSemesterFilter = 'all'; 
        let currentSortMethod = 'semester_asc';

        // ==========================================
        // AUTH & NAVIGATION
        // ==========================================
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainHeader').style.display = 'flex';
                switchTab('grades');
                document.getElementById('userEmailDisplay').innerText = user.email;
                fetchGradesFromDB();
                fetchTasks();
                fetchExams();
            } else {
                currentUser = null;
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('mainHeader').style.display = 'none';
                document.querySelectorAll('.container').forEach(c => { if(c.id !== 'loginScreen') c.style.display = 'none'; });
            }
        });

        function switchTab(tab) {
            const screens = ['appScreen', 'tasksScreen', 'examsScreen'];
            const navButtons = ['tabGrades', 'tabTasks', 'tabExams'];
            screens.forEach(s => document.getElementById(s).style.display = 'none');
            navButtons.forEach(b => document.getElementById(b).classList.remove('active'));
            
            if(tab === 'grades') { document.getElementById('appScreen').style.display = 'block'; document.getElementById('tabGrades').classList.add('active'); }
            if(tab === 'tasks') { document.getElementById('tasksScreen').style.display = 'block'; document.getElementById('tabTasks').classList.add('active'); updateCourseDropdown(); }
            if(tab === 'exams') { document.getElementById('examsScreen').style.display = 'block'; document.getElementById('tabExams').classList.add('active'); updateExamCourseDropdown(); }
        }

        // ==========================================
        // ΛΟΓΙΚΗ ΒΑΘΜΩΝ
        // ==========================================
        function fetchGradesFromDB() {
            db.collection("users").doc(currentUser.uid).collection("grades").onSnapshot(snap => {
                globalGrades = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTable();
            });
        }

        function saveGrade() {
            const name = document.getElementById('course').value;
            const theory = parseFloat(document.getElementById('theoryGrade').value);
            const lab = document.getElementById('labGrade').value ? parseFloat(document.getElementById('labGrade').value) : null;
            const final = parseFloat(document.getElementById('finalGrade').value);
            const sem = parseInt(document.getElementById('semester').value);

            if(!name || isNaN(theory) || isNaN(final) || isNaN(sem)) return alert("Συμπληρώστε τα υποχρεωτικά πεδία!");

            const gradeData = { name, theory, lab, final, semester: sem };
            const ref = db.collection("users").doc(currentUser.uid).collection("grades");

            if (currentGradeEditId === null) {
                ref.add(gradeData);
            } else {
                ref.doc(currentGradeEditId).update(gradeData);
                currentGradeEditId = null;
                document.getElementById("mainBtn").innerText = "Προσθήκη Βαθμού";
            }
            document.querySelectorAll('#appScreen input').forEach(i => i.value = "");
        }

        function editGrade(id) {
            const g = globalGrades.find(item => item.id === id);
            document.getElementById("course").value = g.name;
            document.getElementById("theoryGrade").value = g.theory;
            document.getElementById("labGrade").value = g.lab || "";
            document.getElementById("finalGrade").value = g.final;
            document.getElementById("semester").value = g.semester;
            currentGradeEditId = id;
            document.getElementById("mainBtn").innerText = "Αποθήκευση Αλλαγών";
            scrollToTop();
        }

        function renderTable() {
            const body = document.getElementById("tableBody");
            body.innerHTML = "";
            let list = [...globalGrades];
            if (currentSemesterFilter !== 'all') list = list.filter(e => e.semester === currentSemesterFilter);
            const search = document.getElementById("searchInput").value.toLowerCase();
            if (search) list = list.filter(e => e.name.toLowerCase().includes(search));

            list.sort((a, b) => {
                if (currentSortMethod === 'semester_asc') return a.semester - b.semester;
                if (currentSortMethod === 'semester_desc') return b.semester - a.semester;
                if (currentSortMethod === 'final_desc') return b.final - a.final;
                if (currentSortMethod === 'final_asc') return a.final - b.final;
                if (currentSortMethod === 'name_asc') return a.name.localeCompare(b.name, 'el');
                return 0;
            });

            let sum = 0, count = 0;
            list.forEach(e => {
                if (e.final >= 5) { sum += e.final; count++; }
                body.innerHTML += `<tr>
                    <td>${e.name}</td>
                    <td>${e.theory}</td>
                    <td>${e.lab || "-"}</td>
                    <td style="font-weight:bold; color:${e.final >= 5 ? '#27ae60' : '#e74c3c'}">${e.final}</td>
                    <td>${e.semester}</td>
                    <td>
                        <button class="edit-btn" onclick="editGrade('${e.id}')">Επεξεργασία</button>
                        <button class="delete-btn" onclick="deleteGrade('${e.id}')">Διαγραφή</button>
                    </td>
                </tr>`;
            });
            document.getElementById("averageSpan").innerText = count > 0 ? (sum / count).toFixed(2) : "-";
        }

        function deleteGrade(id) { if(confirm("Διαγραφή μαθήματος;")) db.collection("users").doc(currentUser.uid).collection("grades").doc(id).delete(); }
        function setSemesterFilter(sem) { currentSemesterFilter = sem; document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('btn-filter-' + sem).classList.add('active'); renderTable(); }
        function setSortMethod(method) { currentSortMethod = method; renderTable(); }

        // ==========================================
        // ΛΟΓΙΚΗ ΕΡΓΑΣΙΩΝ
        // ==========================================
        function updateCourseDropdown() {
            const select = document.getElementById('taskCourseSelect');
            select.innerHTML = '<option value="">Επιλέξτε Μάθημα...</option>';
            const sorted = [...globalGrades].sort((a, b) => a.name.localeCompare(b.name, 'el'));
            sorted.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.name; opt.innerText = g.name;
                select.appendChild(opt);
            });
        }

        function fetchTasks() {
            db.collection("users").doc(currentUser.uid).collection("tasks").onSnapshot(snap => {
                globalTasks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTasks();
            });
        }

        function saveTask() {
            const course = document.getElementById('taskCourseSelect').value;
            const type = document.getElementById('taskType').value;
            const status = document.getElementById('taskStatus').value;
            const date = document.getElementById('taskDueDate').value;
            
            if(!course) return alert("Επιλέξτε μάθημα!");

            const taskData = { course, type, status, dueDate: date };
            const ref = db.collection("users").doc(currentUser.uid).collection("tasks");

            if(currentTaskEditId === null) {
                ref.add(taskData);
            } else {
                ref.doc(currentTaskEditId).update(taskData);
                currentTaskEditId = null;
                // Επαναφορά κειμένου κουμπιού
                document.getElementById("mainBtnTask").innerText = "Προσθήκη Εργασίας";
            }
            
            // Καθαρισμός πεδίου ημερομηνίας
            document.getElementById('taskDueDate').value = "";
        }

        function editTask(id) {
            const t = globalTasks.find(item => item.id === id);
            document.getElementById('taskCourseSelect').value = t.course;
            document.getElementById('taskType').value = t.type;
            document.getElementById('taskStatus').value = t.status;
            document.getElementById('taskDueDate').value = t.dueDate || "";
            currentTaskEditId = id;
            document.getElementById("mainBtnTask").innerText = "Αποθήκευση Αλλαγών";
            scrollToTop();
        }

        function renderTasks() {
            const body = document.getElementById('tasksTableBody');
            if (!body) return;
            body.innerHTML = "";

            // 1. Ταξινόμηση με βάση την ημερομηνία (πλησιέστερη ημερομηνία πρώτη)
            let sortedTasks = [...globalTasks].sort((a, b) => {
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return new Date(a.dueDate) - new Date(b.dueDate);
            });

            sortedTasks.forEach(t => {
                let formattedDate = "-";
                if (t.dueDate) {
                    const dateParts = t.dueDate.split("-");
                    formattedDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
                }

                // 2. Έλεγχος αν είναι Done
                const isDone = t.status === 'Done';
                
                // Στυλ μόνο για το όνομα της εργασίας (πρώτο κελί)
                const nameStyle = isDone ? 'style="color: #27ae60; font-weight: bold;"' : '';
                // Στυλ για όλη την υπόλοιπη γραμμή αν θέλεις να είναι διακριτικό
                const rowStyle = isDone ? 'style="opacity: 0.8;"' : '';

                body.innerHTML += `
                    <tr ${rowStyle}>
                        <td ${nameStyle}>${t.course}</td>
                        <td>${t.type}</td>
                        <td>${t.status}</td>
                        <td>${formattedDate}</td>
                        <td>
                            <button class="edit-btn" onclick="editTask('${t.id}')">Επεξεργασία</button>
                            <button class="delete-btn" onclick="deleteTask('${t.id}')">Διαγραφή</button>
                        </td>
                    </tr>`;
            });
        }

        function deleteTask(id) { db.collection("users").doc(currentUser.uid).collection("tasks").doc(id).delete(); }

        // ==========================================
        // ΛΟΓΙΚΗ ΕΞΕΤΑΣΕΩΝ (ΔΙΟΡΘΩΜΕΝΗ)
        // ==========================================
        function updateExamCourseDropdown() {
            const select = document.getElementById('examCourseSelect');
            if (!select) return;
            select.innerHTML = '<option value="">Επιλέξτε Μάθημα...</option>';
            const names = [...new Set(globalGrades.map(g => g.name))].sort((a,b) => a.localeCompare(b, 'el'));
            names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
        }

        function fetchExams() {
            db.collection("users").doc(currentUser.uid).collection("exams").onSnapshot(snap => {
                globalExams = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderExams();
            });
        }

        function saveExam() {
            const course = document.getElementById('examCourseSelect').value;
            const type = document.getElementById('examType').value; // Νέο
            const dateTime = document.getElementById('examDateTime').value;
            const room = document.getElementById('examRoom').value;
            const notes = document.getElementById('examNotes').value;

            if(!course || !dateTime) return alert("Επιλέξτε μάθημα και ημερομηνία!");

            const examData = { course, type, dateTime, room, notes };
            const ref = db.collection("users").doc(currentUser.uid).collection("exams");

            if(currentExamEditId === null) {
                ref.add(examData);
            } else {
                ref.doc(currentExamEditId).update(examData).then(() => {
                    currentExamEditId = null;
                    document.getElementById("mainBtnExam").innerText = "Προσθήκη Εξέτασης";
                });
            }
            
            document.getElementById('examDateTime').value = "";
            document.getElementById('examRoom').value = "";
            document.getElementById('examNotes').value = "";
        }

        function editExam(id) {
            const e = globalExams.find(item => item.id === id);
            if (!e) return;
            document.getElementById('examCourseSelect').value = e.course;
            document.getElementById('examType').value = e.type || "Θεωρία"; // Νέο
            document.getElementById('examDateTime').value = e.dateTime;
            document.getElementById('examRoom').value = e.room || "";
            document.getElementById('examNotes').value = e.notes || "";
            currentExamEditId = id;
            document.getElementById("mainBtnExam").innerText = "Αποθήκευση Αλλαγών";
            scrollToTop();
        }

        function renderExams() {
            const body = document.getElementById('examsTableBody');
            if (!body) return;
            body.innerHTML = "";
            
            const now = new Date();

            // 1. ΤΑΞΙΝΟΜΗΣΗ: Οι πλησιέστερες εξετάσεις πρώτες
            let sortedExams = [...globalExams].sort((a, b) => {
                return new Date(a.dateTime) - new Date(b.dateTime);
            });

            sortedExams.forEach(e => {
                let formattedDateTime = "-";
                let isPast = false;

                if (e.dateTime) {
                    const examDateObj = new Date(e.dateTime); 
                    if (examDateObj < now) isPast = true;

                    const [datePart, timePart] = e.dateTime.split(" ");
                    const dateParts = datePart.split("-");
                    formattedDateTime = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]} ${timePart}`;
                }

                const rowStyle = isPast ? 'style="color: #27ae60 !important; font-weight: bold;"' : '';

                body.innerHTML += `
                    <tr ${rowStyle}>
                        <td>${e.course}</td>
                        <td>${e.type || "-"}</td> <td>${formattedDateTime}</td>
                        <td>${e.room || "-"}</td>
                        <td style="font-size: 12px; color: inherit;">${e.notes || "-"}</td>
                        <td>
                            <button class="edit-btn" onclick="editExam('${e.id}')">Επεξεργασία</button>
                            <button class="delete-btn" onclick="deleteExam('${e.id}')">Διαγραφή</button>
                        </td>
                    </tr>`;
            });
        }

        function deleteExam(id) { 
            if(confirm("Διαγραφή εξέτασης;")) {
                db.collection("users").doc(currentUser.uid).collection("exams").doc(id).delete();
            }
        }

        // ==========================================
        // THEME & UI UTILS
        // ==========================================
        function updateLogos(isDark) {
            const logo = isDark ? "uniwa-dark.png" : "uniwa-logo.png";
            document.getElementById('headerLogo').src = logo;
            document.getElementById('uniwaLogin').src = logo;
            document.getElementById('themeToggle').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('appTheme', isDark ? 'dark' : 'light');
            document.getElementById('flatpickr-dark-theme').disabled = !isDark;
            updateLogos(isDark);
        }

        function initTheme() {
            const isDark = localStorage.getItem('appTheme') === 'dark';
            if (isDark) {
                document.body.classList.add('dark-theme');
                document.getElementById('flatpickr-dark-theme').disabled = false;
            }
            updateLogos(isDark);
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        window.onscroll = function() { document.getElementById("backToTop").style.display = (window.scrollY > 300) ? "block" : "none"; };

        // Flatpickr Init
        flatpickr("#taskDueDate", { locale: "gr", dateFormat: "Y-m-d", altInput: true, altFormat: "d-m-Y" });
        flatpickr("#examDateTime", { locale: "gr", enableTime: true, time_24hr: true, dateFormat: "Y-m-d H:i", altInput: true, altFormat: "d-m-Y H:i" });

        document.addEventListener('DOMContentLoaded', initTheme);

        // Auth wrappers
        function loginUser() { auth.signInWithEmailAndPassword(document.getElementById('emailInput').value, document.getElementById('passwordInput').value).catch(e => alert("Λάθος στοιχεία!")); }
        function registerUser() { auth.createUserWithEmailAndPassword(document.getElementById('emailInput').value, document.getElementById('passwordInput').value).then(u => u.user.sendEmailVerification()); }
        function logoutUser() { auth.signOut(); }
        function resetPassword() { auth.sendPasswordResetEmail(document.getElementById('emailInput').value); }
    </script>
</body>
</html>

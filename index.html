<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Φοιτητικό Portal - UniWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="uniwa-1.png">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle-btn">🌙 Dark Mode</button>

    <header id="mainHeader" style="display: none;">
        <div class="header-left">
            <img src="uniwa-logo.png" id="headerLogo" alt="Logo">
        </div>
        <div class="header-center">
            <button class="nav-btn active" id="tabGrades" onclick="switchTab('grades')">Βαθμοί</button>
            <button class="nav-btn" id="tabTasks" onclick="switchTab('tasks')">Εργασίες</button>
            <button class="nav-btn" id="tabExams" onclick="switchTab('exams')">Εξετάσεις</button>
        </div>
        <div class="header-right">
            <span id="userEmailDisplay" style="font-size: 13px; font-weight: bold;"></span>
            <button onclick="logoutUser()" style="background-color:#e74c3c; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Έξοδος</button>
        </div>
    </header>

    <div class="container" id="loginScreen">
        <img src="uniwa-logo.png" id="uniwaLogin" alt="Logo" width="280" style="margin-bottom:20px;">
        <h2>Είσοδος στο Portal</h2>
        <div class="auth-form">
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Κωδικός">
            <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                <button onclick="loginUser()" style="background-color:#2980b9; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer;">Σύνδεση</button>
                <button onclick="registerUser()" style="background-color:#27ae60; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer;">Εγγραφή</button>
            </div>
            <p style="margin-top:15px;"><a href="#" onclick="resetPassword()" style="text-decoration:none; color:#7f8c8d; font-size:13px;">Ξέχασα τον κωδικό μου</a></p>
        </div>
    </div>

    <div class="container" id="appScreen" style="display: none;">
        <h1>Διαχείριση Βαθμών</h1>
        <div class="input-selection">
            <input type="text" id="course" placeholder="Όνομα Μαθήματος">
            <input type="number" id="theoryGrade" placeholder="Θεωρία" step="0.1">
            <input type="number" id="labGrade" placeholder="Εργαστήριο" step="0.1">
            <input type="number" id="finalGrade" placeholder="Τελικός" step="0.1">
            <input type="number" id="semester" placeholder="Εξάμηνο">
            <button id="mainBtn" onclick="saveGrade()">Προσθήκη Βαθμού</button>
        </div>

        <div class="semester-filter">
            <button class="filter-btn active" id="btn-filter-all" onclick="setSemesterFilter('all')">Όλα</button>
            </div>

        <table>
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Θεωρία</th>
                    <th>Εργαστήριο</th>
                    <th>Τελικός</th>
                    <th>Εξάμηνο</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div class="average-section"><h3>Μέσος όρος: <span id="averageSpan">-</span></h3></div>
    </div>

    <div class="container" id="tasksScreen" style="display: none;">
        <h1>Λίστα Εργασιών</h1>
        <div class="input-selection">
            <select id="taskCourseSelect">
                <option value="">Επιλέξτε Μάθημα...</option>
            </select>
            <select id="taskType">
                <option value="Θεωρία">Θεωρία</option>
                <option value="Εργαστήριο">Εργαστήριο</option>
            </select>
            <input type="date" id="taskDueDate">
            <button id="mainBtn" onclick="saveTask()">Προσθήκη Εργασίας</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Τύπος</th>
                    <th>Ημ. Παράδοσης</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody"></tbody>
        </table>
    </div>

    <script>
        // FIREBASE CONFIG - Βάλε τα δικά σου στοιχεία εδώ
        const firebaseConfig = {
            apiKey: "AIzaSyCgdS2DvO1yUksP9FiAxWpvUJsJbv4pSmE",
            authDomain: "universitygrades-58ed7.firebaseapp.com",
            projectId: "universitygrades-58ed7",
            storageBucket: "universitygrades-58ed7.firebasestorage.app",
            messagingSenderId: "403775984431",
            appId: "1:403775984431:web:e37a5618870f985ffe87da"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let globalGrades = [];
        let globalTasks = [];

        // --- AUTH & NAVIGATION ---
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainHeader').style.display = 'flex';
                switchTab('grades');
                document.getElementById('userEmailDisplay').innerText = user.email;
                fetchGrades();
                fetchTasks();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('mainHeader').style.display = 'none';
            }
        });

        function switchTab(tab) {
            const screens = ['appScreen', 'tasksScreen'];
            const navButtons = ['tabGrades', 'tabTasks'];
            screens.forEach(s => document.getElementById(s).style.display = 'none');
            navButtons.forEach(b => document.getElementById(b).classList.remove('active'));
            
            if(tab === 'grades') { document.getElementById('appScreen').style.display = 'block'; document.getElementById('tabGrades').classList.add('active'); }
            if(tab === 'tasks') { document.getElementById('tasksScreen').style.display = 'block'; document.getElementById('tabTasks').classList.add('active'); }
        }

        // --- ΒΑΘΜΟΙ (GRADES LOGIC) ---
        function fetchGrades() {
            db.collection("users").doc(currentUser.uid).collection("grades").onSnapshot(snap => {
                globalGrades = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateCourseDropdown();
                renderGrades();
            });
        }

        function saveGrade() {
            const name = document.getElementById('course').value;
            const theory = parseFloat(document.getElementById('theoryGrade').value);
            const final = parseFloat(document.getElementById('finalGrade').value);
            const sem = parseInt(document.getElementById('semester').value);
            if(!name || isNaN(final)) return alert("Συμπληρώστε όνομα και τελικό βαθμό!");

            db.collection("users").doc(currentUser.uid).collection("grades").add({
                name, theory, final, semester: sem, lab: parseFloat(document.getElementById('labGrade').value) || null
            });
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function renderGrades() {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let sum = 0, count = 0;
            globalGrades.forEach(g => {
                if(g.final >= 5) { sum += g.final; count++; }
                body.innerHTML += `<tr><td>${g.name}</td><td>${g.theory||'-'}</td><td>${g.lab||'-'}</td><td class="${g.final>=5?'grade-pass':'grade-fail'}">${g.final}</td><td>${g.semester}</td><td><button onclick="deleteGrade('${g.id}')">❌</button></td></tr>`;
            });
            document.getElementById('averageSpan').innerText = count > 0 ? (sum/count).toFixed(2) : "-";
        }

        function deleteGrade(id) { if(confirm("Διαγραφή;")) db.collection("users").doc(currentUser.uid).collection("grades").doc(id).delete(); }

        // --- ΕΡΓΑΣΙΕΣ (TASKS LOGIC) ---
        function updateCourseDropdown() {
            const select = document.getElementById('taskCourseSelect');
            select.innerHTML = '<option value="">Επιλέξτε Μάθημα...</option>';
            globalGrades.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.name; opt.innerText = g.name;
                select.appendChild(opt);
            });
        }

        function fetchTasks() {
            db.collection("users").doc(currentUser.uid).collection("tasks").onSnapshot(snap => {
                globalTasks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTasks();
            });
        }

        function saveTask() {
            const course = document.getElementById('taskCourseSelect').value;
            const type = document.getElementById('taskType').value;
            const date = document.getElementById('taskDueDate').value;
            if(!course) return alert("Επιλέξτε μάθημα!");
            db.collection("users").doc(currentUser.uid).collection("tasks").add({ course, type, dueDate: date });
        }

        function renderTasks() {
            const body = document.getElementById('tasksTableBody');
            body.innerHTML = "";
            const sorted = [...globalTasks].sort((a,b) => (a.dueDate > b.dueDate) ? 1 : -1);
            sorted.forEach(t => {
                body.innerHTML += `<tr><td>${t.course}</td><td><span class="badge ${t.type==='Θεωρία'?'badge-theory':'badge-lab'}">${t.type}</span></td><td>${t.dueDate||'-'}</td><td><button onclick="deleteTask('${t.id}')">❌</button></td></tr>`;
            });
        }

        function deleteTask(id) { db.collection("users").doc(currentUser.uid).collection("tasks").doc(id).delete(); }

        // --- THEME LOGIC ---
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('appTheme', isDark ? 'dark' : 'light');
            updateLogos(isDark);
        }
        function updateLogos(isDark) {
            const logo = isDark ? "uniwa-dark.png" : "uniwa-logo.png";
            document.getElementById('headerLogo').src = logo;
            document.getElementById('uniwaLogin').src = logo;
        }
        if(localStorage.getItem('appTheme') === 'dark') { document.body.classList.add('dark-theme'); updateLogos(true); }

        function loginUser() { auth.signInWithEmailAndPassword(document.getElementById('emailInput').value, document.getElementById('passwordInput').value); }
        function logoutUser() { auth.signOut(); }
    </script>
</body>
</html>

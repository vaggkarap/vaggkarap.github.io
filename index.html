<!DOCTYPE html>
<html lang="el">
    <head>
        <meta charset="UTF-8">
        <title>Βαθμοί Πανεπιστημίου</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Διαχείριση Βαθμών</h1>
            <img src="uniwa.png" name="uniwa" id="uniwa" width="200" height="200">
            <div class="input-selection">
                <input type="text" id="course" placeholder="Course">
                <input type="number" id="grade" placeholder="Grade" min="0" max="10" step="0.1">
                <input type="number" id="semester" placeholder="Semester" min="1" max="10" step="1">
                <button onclick="addGrade()">Προσθήκη</button>
            </div>

            <table id="gradesTable">
                <thead>
                    <tr>
                        <th>Μάθημα</th>
                        <th>Βαθμός</th>
                        <th>Εξάμηνο</th>
                        <th>Ενέργεια</th>
                    </tr>
                </thead>
                <tbody id="tableBody">

                </tbody>
            </table>

            <div class="average-section">
                <h3>Μέσος όρος: <span id="averageSpan">-</span></h3>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', loadGrades)

            function addGrade(){
                const nameInput = document.getElementById("course").value;
                const gradeInput = document.getElementById("grade").value;
                const semesterInput = document.getElementById("semester").value;

                if(nameInput === "" || gradeInput === "" || gradeInput < 0 || gradeInput > 10){
                    alert("Invalid course or grade");
                    return;
                }

                const newEntry = {name: nameInput, grade :parseFloat(gradeInput), semester:parseInt(semesterInput)};

                let gradesList = JSON.parse(localStorage.getItem("myGrades")) || [];

                gradesList.push(newEntry);

                localStorage.setItem("myGrades", JSON.stringify(gradesList));

                document.getElementById("course").value = "";
                document.getElementById("grade").value = "";
                document.getElementById("semester").value = "";


                loadGrades();
            }

            function loadGrades(){
                const tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = "";

                let gradesList = JSON.parse(localStorage.getItem("myGrades")) || [];
                let totalSum = 0;

                if(gradesList.length === 0){
                    document.getElementById("averageSpan").innerText = "-";
                    return;
                }

                gradesList.forEach(function(entry, index) {
                    totalSum += entry.grade; 

                    let row = `<tr>
                                    <td>${entry.name}</td>
                                    <td>${entry.grade}</td>
                                    <td>${entry.semester}</td>
                                    <td><button class="delete-btn" onclick="deleteGrade(${index})">Διαγραφή</button></td>
                                </tr>`;
                    tableBody.innerHTML +=row;

                });

                const average = totalSum / gradesList.length;
                document.getElementById("averageSpan").innerText = average.toFixed(2);
            }

            function deleteGrade(indexToRemove){
                let gradesList = JSON.parse(localStorage.getItem("myGrades"));

                gradesList.splice(indexToRemove, 1);

                localStorage.setItem("myGrades", JSON.stringify(gradesList));
                loadGrades();
            }
        </script>
        
    </body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Βαθμοί Πανεπιστημίου</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container" id="loginScreen">
        <img src="uniwa-bg.png" alt="Λογότυπο" width="300" style="margin-bottom:20px;">
        <h2>Καλώς Ήρθατε</h2>
        <p>Συνδεθείτε για να δείτε τους βαθμούς σας</p>
        
        <div class="auth-form">
            <input type="email" id="emailInput" placeholder="Το Email σας" required>
            <input type="password" id="passwordInput" placeholder="Ο Κωδικός σας (min. 6 χαρακτήρες)" required>
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button onclick="loginUser()" style="background-color: #2980b9;">Σύνδεση</button>
                <button onclick="registerUser()" style="background-color: #27ae60;">Εγγραφή</button>
            </div>
        </div>
    </div>


    <div class="container" id="appScreen" style="display: none;">
        
        <div style="text-align: right; margin-bottom: 10px;">
            <span id="userEmailDisplay" style="font-size: 14px; color: #7f8c8d; margin-right: 15px;"></span>
            <button onclick="logoutUser()" style="background-color: #e74c3c; padding: 5px 10px; font-size: 14px;">Αποσύνδεση</button>
        </div>

        <h1>Διαχείριση Βαθμών</h1>
        
        <div class="input-selection">
            <input type="text" id="course" placeholder="Όνομα Μαθήματος">
            <input type="number" id="grade" placeholder="Βαθμός (0-10)" min="0" max="10" step="0.1">
            <input type="number" id="semester" placeholder="Εξάμηνο" min="1" max="10" step="1">
            <button id="mainBtn" onclick="saveGrade()">Προσθήκη</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="🔍 Αναζήτηση μαθήματος...">
        </div>

        <table id="gradesTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Βαθμός</th>
                    <th>Εξάμηνο</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="average-section">
            <h3>Μέσος όρος: <span id="averageSpan">-</span></h3>
        </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()" title="Πίσω στην κορυφή">⬆️</button>

    <script>
        // ==========================================
        // 1. ΡΥΘΜΙΣΕΙΣ FIREBASE (ΒΑΛΕ ΤΑ ΔΙΚΑ ΣΟΥ ΕΔΩ!)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCgds2DvO1yUksP9FiAxWpvUJsJbv4pSmE",
            authDomain: "universitygrades-58ed7.firebaseapp.com",
            projectId: "universitygrades-58ed7",
            storageBucket: "universitygrades-58ed7.firebasestorage.app",
            messagingSenderId: "403775984431",
            appId: "1:403775984431:web:e37a5618870f985ffe87da",
            measurementId: "G-4738X1ER9F"
        };

        // Αρχικοποίηση Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Μεταβλητές εφαρμογής
        let currentUser = null;
        let globalGrades = [];
        let currentEditId = null;

        // ==========================================
        // 2. ΣΥΣΤΗΜΑ ΧΡΗΣΤΩΝ (ΑΥΘΕΝΤΙΚΟΠΟΙΗΣΗ)
        // ==========================================
        
        // Παρακολουθεί αν ο χρήστης μπήκε ή βγήκε
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Ο χρήστης είναι συνδεδεμένος
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('userEmailDisplay').innerText = user.email;
                
                // Φέρνουμε τους βαθμούς ΤΟΥ ΣΥΓΚΕΚΡΙΜΕΝΟΥ ΧΡΗΣΤΗ
                fetchGradesFromDB();
            } else {
                // Δεν υπάρχει χρήστης (Δείξε το Login)
                currentUser = null;
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
            }
        });

        // ΕΓΓΡΑΦΗ ΧΡΗΣΤΗ ΚΑΙ EMAIL ΕΠΙΒΕΒΑΙΩΣΗΣ
        function registerUser() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            
            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    // Στέλνουμε το email επιβεβαίωσης
                    userCredential.user.sendEmailVerification().then(() => {
                        alert("Η εγγραφή πέτυχε! Σας έχει σταλεί ένα Email επιβεβαίωσης. Ελέγξτε τα εισερχόμενά σας (και τα Spam).");
                    });
                })
                .catch((error) => alert("Σφάλμα: " + error.message));
        }

        // ΣΥΝΔΕΣΗ ΧΡΗΣΤΗ
        function loginUser() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            
            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => alert("Λάθος email ή κωδικός!"));
        }

        // ΑΠΟΣΥΝΔΕΣΗ
        function logoutUser() {
            auth.signOut();
        }

        // ==========================================
        // 3. ΒΑΣΗ ΔΕΔΟΜΕΝΩΝ (FIRESTORE)
        // ==========================================

        function fetchGradesFromDB() {
            // Διαβάζουμε από τον "φάκελο" του συγκεκριμένου χρήστη!
            db.collection("users").doc(currentUser.uid).collection("grades")
              .onSnapshot((querySnapshot) => {
                  globalGrades = [];
                  querySnapshot.forEach((doc) => {
                      // Κρατάμε και το ID της Firebase
                      let data = doc.data();
                      data.id = doc.id; 
                      globalGrades.push(data);
                  });
                  // Ταξινομούμε και ζωγραφίζουμε
                  globalGrades.sort((a, b) => a.semester - b.semester);
                  renderTable();
              });
        }

        function saveGrade() {
            const nameInput = document.getElementById("course").value;
            const gradeInput = document.getElementById("grade").value;
            const semesterInput = document.getElementById("semester").value;

            if(!nameInput || !gradeInput || !semesterInput) {
                alert("Συμπληρώστε όλα τα πεδία!"); return;
            }

            const gradeData = {
                name: nameInput,
                grade: parseFloat(gradeInput),
                semester: parseInt(semesterInput)
            };

            const userGradesRef = db.collection("users").doc(currentUser.uid).collection("grades");

            if (currentEditId === null) {
                // ΠΡΟΣΘΗΚΗ ΣΤΗ FIREBASE
                userGradesRef.add(gradeData);
            } else {
                // ΕΝΗΜΕΡΩΣΗ ΣΤΗ FIREBASE
                userGradesRef.doc(currentEditId).update(gradeData);
                currentEditId = null;
                document.getElementById("mainBtn").innerText = "Προσθήκη";
            }

            document.getElementById("course").value = "";
            document.getElementById("grade").value = "";
            document.getElementById("semester").value = "";
        }

        function editGrade(docId) {
            const entry = globalGrades.find(g => g.id === docId);
            if(entry) {
                document.getElementById("course").value = entry.name;
                document.getElementById("grade").value = entry.grade;
                document.getElementById("semester").value = entry.semester;
                currentEditId = docId;
                document.getElementById("mainBtn").innerText = "Αποθήκευση";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deleteGrade(docId) {
            if(confirm("Σίγουρα θέλετε να διαγράψετε το μάθημα;")) {
                // ΔΙΑΓΡΑΦΗ ΑΠΟ ΤΗ FIREBASE
                db.collection("users").doc(currentUser.uid).collection("grades").doc(docId).delete();
            }
        }

        function renderTable() {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";

            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            const displayList = globalGrades.filter(entry => entry.name.toLowerCase().includes(searchQuery));

            let passedSum = 0, passedCount = 0;

            displayList.forEach(entry => {
                if (entry.grade >= 5) {
                    passedSum += entry.grade;
                    passedCount++;            
                }
                
                let gradeClass = entry.grade >= 5 ? "grade-pass" : "grade-fail";
                // Προσέξτε: Εδώ περνάμε το 'entry.id' (που είναι String της Firebase) μέσα σε εισαγωγικά!
                let row = `<tr>
                                <td>${entry.name}</td>
                                <td class="${gradeClass}">${entry.grade}</td>
                                <td>${entry.semester}</td>
                                <td>
                                    <button class="edit-btn" onclick="editGrade('${entry.id}')">Επεξεργασία</button>
                                    <button class="delete-btn" onclick="deleteGrade('${entry.id}')">Διαγραφή</button>
                                </td>
                            </tr>`;
                tableBody.innerHTML += row;
            });

            if (passedCount > 0) {
                document.getElementById("averageSpan").innerText = (passedSum / passedCount).toFixed(2);
            } else {
                document.getElementById("averageSpan").innerText = "-";
            }
        }

        window.onscroll = function() {
            const topBtn = document.getElementById("backToTop");
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                topBtn.style.display = "block";
            } else {
                topBtn.style.display = "none";
            }
        };

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

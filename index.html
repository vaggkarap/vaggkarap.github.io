<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Βαθμοί Πανεπιστημίου</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png"> <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container" id="loginScreen">
        <img src="uniwa-bg.png" alt="Λογότυπο" width="300" style="margin-bottom:20px;">
        <h2>Καλώς Ήρθατε</h2>
        <p>Συνδεθείτε για να δείτε τους βαθμούς σας</p>
        
        <div class="auth-form">
            <input type="email" id="emailInput" placeholder="Το Email σας" required>
            <input type="password" id="passwordInput" placeholder="Ο Κωδικός σας (min. 6 χαρακτήρες)" required>
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button onclick="loginUser()" style="background-color: #2980b9; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Σύνδεση</button>
                <button onclick="registerUser()" style="background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Εγγραφή</button>
            </div>
            <div style="margin-top: 15px;">
                <a href="#" onclick="resetPassword()" style="color: #34495e; font-size: 13px; text-decoration: none;">Ξέχασα τον κωδικό μου</a>
            </div>
        </div>
    </div>


    <div class="container" id="appScreen" style="display: none;">
        
        <div style="text-align: right; margin-bottom: 10px;">
            <span id="userEmailDisplay" style="font-size: 14px; color: #7f8c8d; margin-right: 15px;"></span>
            <button onclick="logoutUser()" style="background-color: #e74c3c; color: white; border: none; padding: 5px 10px; font-size: 14px; border-radius: 5px; cursor: pointer;">Αποσύνδεση</button>
        </div>

        <img src="uniwa-bg.png" name="uniwa" id="uniwa" width="500" height="150" alt="Λογότυπο Πανεπιστημίου">
        <h1>Διαχείριση Βαθμών</h1>
        
        <div class="input-selection">
            <input type="text" id="course" placeholder="Όνομα Μαθήματος">
            <input type="number" id="grade" placeholder="Βαθμός (0-10)" min="0" max="10" step="0.1">
            <input type="number" id="semester" placeholder="Εξάμηνο" min="1" max="10" step="1">
            <button id="mainBtn" onclick="saveGrade()">Προσθήκη</button>
        </div>

        <div class="semester-filter">
            <button class="filter-btn active" id="btn-filter-all" onclick="setSemesterFilter('all')">Όλα</button>
            <button class="filter-btn" id="btn-filter-1" onclick="setSemesterFilter(1)">1ο</button>
            <button class="filter-btn" id="btn-filter-2" onclick="setSemesterFilter(2)">2ο</button>
            <button class="filter-btn" id="btn-filter-3" onclick="setSemesterFilter(3)">3ο</button>
            <button class="filter-btn" id="btn-filter-4" onclick="setSemesterFilter(4)">4ο</button>
            <button class="filter-btn" id="btn-filter-5" onclick="setSemesterFilter(5)">5ο</button>
            <button class="filter-btn" id="btn-filter-6" onclick="setSemesterFilter(6)">6ο</button>
            <button class="filter-btn" id="btn-filter-7" onclick="setSemesterFilter(7)">7ο</button>
            <button class="filter-btn" id="btn-filter-8" onclick="setSemesterFilter(8)">8ο</button>
            <button class="filter-btn" id="btn-filter-9" onclick="setSemesterFilter(9)">9ο</button>
            <button class="filter-btn" id="btn-filter-10" onclick="setSemesterFilter(10)">10ο</button>
        </div>

        <div class="controls-section" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="🔍 Αναζήτηση μαθήματος..." style="flex: 2; padding: 12px; border: 2px solid #3498db; border-radius: 5px; font-size: 16px;">
            
            <select id="sortSelect" onchange="setSortMethod(this.value)" style="flex: 1; padding: 12px; border: 2px solid #3498db; border-radius: 5px; font-size: 14px; background-color: white; cursor: pointer;">
                <option value="semester_asc">⬇️ Εξάμηνο (1-10)</option>
                <option value="semester_desc">⬆️ Εξάμηνο (10-1)</option>
                <option value="grade_desc">🏆 Βαθμός (Υψηλότερος)</option>
                <option value="grade_asc">📉 Βαθμός (Χαμηλότερος)</option>
                <option value="name_asc">🔤 Όνομα (Α - Ω)</option>
            </select>
        </div>

        <table id="gradesTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Βαθμός</th>
                    <th>Εξάμηνο</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="average-section">
            <h3>Μέσος όρος: <span id="averageSpan">-</span></h3>
        </div>

        <div class="backup-section">
            <button class="backup-btn export" onclick="exportToFile()">💾 Εξαγωγή σε Excel</button>
            <label for="importFile" class="backup-btn import">📂 Φόρτωση από Excel</label>
            <input type="file" id="importFile" accept=".csv" style="display:none" onchange="importFromFile(event)">
        </div>

    </div>

    <button id="backToTop" onclick="scrollToTop()" title="Πίσω στην κορυφή">⬆️</button>

    <script>
        // ==========================================
        // 1. ΡΥΘΜΙΣΕΙΣ FIREBASE 
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCgdS2DvO1yUksP9FiAxWpvUJsJbv4pSmE", // <--- ΜΗΝ ΤΟ ΞΕΧΑΣΕΙΣ
            authDomain: "universitygrades-58ed7.firebaseapp.com",
            projectId: "universitygrades-58ed7",
            storageBucket: "universitygrades-58ed7.firebasestorage.app",
            messagingSenderId: "403775984431",
            appId: "1:403775984431:web:e37a5618870f985ffe87da",
            measurementId: "G-4738X1ER9F"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let globalGrades = [];
        let currentEditId = null;
        let currentSemesterFilter = 'all'; 
        let currentSortMethod = 'semester_asc'; // ΝΕΑ μεταβλητή για την ταξινόμηση

        // ==========================================
        // 2. ΣΥΣΤΗΜΑ ΧΡΗΣΤΩΝ (AUTH)
        // ==========================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('userEmailDisplay').innerText = user.email;
                fetchGradesFromDB();
            } else {
                currentUser = null;
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
            }
        });

        function registerUser() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    userCredential.user.sendEmailVerification().then(() => {
                        alert("Η εγγραφή πέτυχε! Σας έχει σταλεί email επιβεβαίωσης.");
                    });
                })
                .catch((error) => alert("Σφάλμα: " + error.message));
        }

        function loginUser() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => alert("Λάθος email ή κωδικός!"));
        }

        function logoutUser() {
            auth.signOut();
        }

        function resetPassword() {
            const email = document.getElementById('emailInput').value;
            if (!email) {
                alert("Παρακαλώ συμπληρώστε πρώτα το email σας στο παραπάνω πεδίο.");
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => alert("Σας στείλαμε email για επαναφορά κωδικού. Ελέγξτε και τα Spam!"))
                .catch((error) => alert("Σφάλμα: " + error.message));
        }

        // ==========================================
        // 3. ΒΑΣΗ ΔΕΔΟΜΕΝΩΝ (FIRESTORE)
        // ==========================================
        function fetchGradesFromDB() {
            db.collection("users").doc(currentUser.uid).collection("grades")
              .onSnapshot((querySnapshot) => {
                  globalGrades = [];
                  querySnapshot.forEach((doc) => {
                      let data = doc.data();
                      data.id = doc.id; 
                      globalGrades.push(data);
                  });
                  renderTable(); // Η ταξινόμηση γίνεται πλέον δυναμικά μέσα στη renderTable
              });
        }

        function saveGrade() {
            const nameInput = document.getElementById("course").value;
            const gradeInput = document.getElementById("grade").value;
            const semesterInput = document.getElementById("semester").value;

            if(!nameInput || !gradeInput || !semesterInput || gradeInput < 0 || gradeInput > 10) {
                alert("Συμπληρώστε σωστά όλα τα πεδία (Βαθμός 0-10)!"); return;
            }

            const gradeData = {
                name: nameInput,
                grade: parseFloat(gradeInput),
                semester: parseInt(semesterInput)
            };

            const userGradesRef = db.collection("users").doc(currentUser.uid).collection("grades");

            if (currentEditId === null) {
                userGradesRef.add(gradeData);
            } else {
                userGradesRef.doc(currentEditId).update(gradeData);
                currentEditId = null;
                document.getElementById("mainBtn").innerText = "Προσθήκη";
            }

            document.getElementById("course").value = "";
            document.getElementById("grade").value = "";
            document.getElementById("semester").value = "";
        }

        function editGrade(docId) {
            const entry = globalGrades.find(g => g.id === docId);
            if(entry) {
                document.getElementById("course").value = entry.name;
                document.getElementById("grade").value = entry.grade;
                document.getElementById("semester").value = entry.semester;
                currentEditId = docId;
                document.getElementById("mainBtn").innerText = "Αποθήκευση";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deleteGrade(docId) {
            if(confirm("Σίγουρα θέλετε να διαγράψετε το μάθημα;")) {
                db.collection("users").doc(currentUser.uid).collection("grades").doc(docId).delete();
            }
        }

        // ==========================================
        // 4. ΕΜΦΑΝΙΣΗ (ΦΙΛΤΡΑ, ΑΝΑΖΗΤΗΣΗ, ΤΑΞΙΝΟΜΗΣΗ)
        // ==========================================
        function setSemesterFilter(sem) {
            currentSemesterFilter = sem;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-filter-' + sem).classList.add('active');
            renderTable();
        }

        // ΝΕΑ ΣΥΝΑΡΤΗΣΗ: Αλλάζει τη μέθοδο ταξινόμησης
        function setSortMethod(method) {
            currentSortMethod = method;
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";

            // Φτιάχνουμε ένα αντίγραφο της λίστας για να μην πειράξουμε τα αρχικά δεδομένα
            let displayList = [...globalGrades];

            // 1. Εφαρμογή Φίλτρου Εξαμήνου
            if (currentSemesterFilter !== 'all') {
                displayList = displayList.filter(entry => entry.semester === currentSemesterFilter);
            }

            // 2. Εφαρμογή Αναζήτησης
            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            if (searchQuery) {
                displayList = displayList.filter(entry => entry.name.toLowerCase().includes(searchQuery));
            }

            // 3. Εφαρμογή Ταξινόμησης (Η Νέα Μαγεία!)
            displayList.sort((a, b) => {
                if (currentSortMethod === 'semester_asc') return a.semester - b.semester;
                if (currentSortMethod === 'semester_desc') return b.semester - a.semester;
                if (currentSortMethod === 'grade_desc') return b.grade - a.grade;
                if (currentSortMethod === 'grade_asc') return a.grade - b.grade;
                if (currentSortMethod === 'name_asc') return a.name.localeCompare(b.name, 'el'); // 'el' = Ελληνικό αλφάβητο
                return 0;
            });

            // 4. Ζωγραφική και Υπολογισμός Μέσου Όρου
            let passedSum = 0, passedCount = 0;

            displayList.forEach(entry => {
                if (entry.grade >= 5) {
                    passedSum += entry.grade;
                    passedCount++;            
                }
                
                let gradeClass = entry.grade >= 5 ? "grade-pass" : "grade-fail";
                let row = `<tr>
                                <td>${entry.name}</td>
                                <td class="${gradeClass}">${entry.grade}</td>
                                <td>${entry.semester}</td>
                                <td>
                                    <button class="edit-btn" onclick="editGrade('${entry.id}')">Επεξεργασία</button>
                                    <button class="delete-btn" onclick="deleteGrade('${entry.id}')">Διαγραφή</button>
                                </td>
                            </tr>`;
                tableBody.innerHTML += row;
            });

            if (passedCount > 0) {
                document.getElementById("averageSpan").innerText = (passedSum / passedCount).toFixed(2);
            } else {
                document.getElementById("averageSpan").innerText = "-";
            }
        }

        // ==========================================
        // 5. EXCEL (CSV) 
        // ==========================================
        function exportToFile() {
            if (globalGrades.length === 0) {
                alert("Δεν υπάρχουν βαθμοί για αποθήκευση!");
                return;
            }
            let csvContent = "Μάθημα,Βαθμός,Εξάμηνο\n";
            globalGrades.forEach(entry => {
                let safeName = entry.name.includes(',') ? `"${entry.name}"` : entry.name;
                csvContent += `${safeName},${entry.grade},${entry.semester}\n`;
            });
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "vathmoi_excel.csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function importFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const text = e.target.result;
                    const lines = text.split('\n');
                    let newGrades = [];
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue; 
                        const parts = line.split(',');
                        let nameStr = parts[0].replace(/(^"|"$)/g, ''); 
                        let gradeNum = parseFloat(parts[1]);
                        let semesterNum = parseInt(parts[2]);
                        if (nameStr && !isNaN(gradeNum) && !isNaN(semesterNum)) {
                            newGrades.push({ name: nameStr, grade: gradeNum, semester: semesterNum });
                        }
                    }
                    if (newGrades.length > 0) {
                        if(confirm("Προσοχή! Η φόρτωση θα αντικαταστήσει τους τρέχοντες βαθμούς. Συνέχεια;")) {
                            const userGradesRef = db.collection("users").doc(currentUser.uid).collection("grades");
                            const batch = db.batch();
                            const snapshot = await userGradesRef.get();
                            snapshot.docs.forEach(doc => batch.delete(doc.ref));
                            newGrades.forEach(grade => {
                                const newDocRef = userGradesRef.doc(); 
                                batch.set(newDocRef, grade);
                            });
                            await batch.commit();
                            alert("Οι βαθμοί φορτώθηκαν επιτυχώς στο Cloud!");
                        }
                    } else { alert("Το αρχείο δεν περιέχει έγκυρα δεδομένα."); }
                } catch (err) { alert("Σφάλμα κατά την ανάγνωση."); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        // Back to Top
        window.onscroll = function() {
            const topBtn = document.getElementById("backToTop");
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                topBtn.style.display = "block";
            } else {
                topBtn.style.display = "none";
            }
        };

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

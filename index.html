<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Βαθμοί Πανεπιστημίου</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="topOfPage">
        <img src="uniwa-bg.png" name="uniwa" id="uniwa" width="500" height="150" alt="Λογότυπο Πανεπιστημίου">
        
        <h1>Διαχείριση Βαθμών</h1>
        
        <div class="input-selection">
            <input type="text" id="course" placeholder="Όνομα Μαθήματος">
            <input type="number" id="grade" placeholder="Βαθμός (0-10)" min="0" max="10" step="0.1">
            <input type="number" id="semester" placeholder="Εξάμηνο" min="1" max="10" step="1">
            <button id="mainBtn" onclick="saveGrade()">Προσθήκη</button>
        </div>

        <div class="semester-filter">
            <button class="filter-btn active" id="btn-filter-all" onclick="setSemesterFilter('all')">Όλα</button>
            <button class="filter-btn" id="btn-filter-1" onclick="setSemesterFilter(1)">1ο</button>
            <button class="filter-btn" id="btn-filter-2" onclick="setSemesterFilter(2)">2ο</button>
            <button class="filter-btn" id="btn-filter-3" onclick="setSemesterFilter(3)">3ο</button>
            <button class="filter-btn" id="btn-filter-4" onclick="setSemesterFilter(4)">4ο</button>
            <button class="filter-btn" id="btn-filter-5" onclick="setSemesterFilter(5)">5ο</button>
            <button class="filter-btn" id="btn-filter-6" onclick="setSemesterFilter(6)">6ο</button>
            <button class="filter-btn" id="btn-filter-7" onclick="setSemesterFilter(7)">7ο</button>
            <button class="filter-btn" id="btn-filter-8" onclick="setSemesterFilter(8)">8ο</button>
            <button class="filter-btn" id="btn-filter-9" onclick="setSemesterFilter(9)">9ο</button>
            <button class="filter-btn" id="btn-filter-10" onclick="setSemesterFilter(10)">10ο</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" onkeyup="loadGrades()" placeholder="🔍 Αναζήτηση μαθήματος...">
        </div>

        <table id="gradesTable">
            <thead>
                <tr>
                    <th>Μάθημα</th>
                    <th>Βαθμός</th>
                    <th>Εξάμηνο</th>
                    <th>Ενέργεια</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <div class="average-section">
            <h3>Μέσος όρος: <span id="averageSpan">-</span></h3>
        </div>

        <div class="backup-section">
            <button class="backup-btn export" onclick="exportToFile()">💾 Αποθήκευση Αντιγράφου</button>
            <label for="importFile" class="backup-btn import">📂 Φόρτωση Αντιγράφου</label>
            <input type="file" id="importFile" style="display:none" onchange="importFromFile(event)">
        </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()" title="Πίσω στην κορυφή">⬆️</button>

    <script>
        let currentEditId = null;
        let currentSemesterFilter = 'all'; 

        document.addEventListener('DOMContentLoaded', loadGrades);

        function setSemesterFilter(sem) {
            currentSemesterFilter = sem;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-filter-' + sem).classList.add('active');
            loadGrades();
        }

        function saveGrade() {
            const nameInput = document.getElementById("course").value;
            const gradeInput = document.getElementById("grade").value;
            const semesterInput = document.getElementById("semester").value;

            if(nameInput === "" || gradeInput === "" || gradeInput < 0 || gradeInput > 10 || semesterInput === ""){
                alert("Παρακαλώ συμπληρώστε σωστά όλα τα πεδία!");
                return;
            }

            let gradesList = JSON.parse(localStorage.getItem("myGrades")) || [];

            if (currentEditId === null) {
                const newEntry = { 
                    id: Date.now(), 
                    name: nameInput, 
                    grade: parseFloat(gradeInput), 
                    semester: parseInt(semesterInput) 
                };
                gradesList.push(newEntry);
            } else {
                const index = gradesList.findIndex(entry => entry.id === currentEditId);
                if (index !== -1) {
                    gradesList[index].name = nameInput;
                    gradesList[index].grade = parseFloat(gradeInput);
                    gradesList[index].semester = parseInt(semesterInput);
                }
                currentEditId = null;
                document.getElementById("mainBtn").innerText = "Προσθήκη";
            }

            gradesList.sort((a, b) => a.semester - b.semester);
            localStorage.setItem("myGrades", JSON.stringify(gradesList));
            clearInputs();
            loadGrades();
        }

        function clearInputs() {
            document.getElementById("course").value = "";
            document.getElementById("grade").value = "";
            document.getElementById("semester").value = "";
            document.getElementById("searchInput").value = "";
        }

        function editGrade(idToEdit) {
            let gradesList = JSON.parse(localStorage.getItem("myGrades")) || [];
            const entryToEdit = gradesList.find(entry => entry.id === idToEdit);

            if (entryToEdit) {
                document.getElementById("course").value = entryToEdit.name;
                document.getElementById("grade").value = entryToEdit.grade;
                document.getElementById("semester").value = entryToEdit.semester;

                currentEditId = idToEdit;
                document.getElementById("mainBtn").innerText = "Αποθήκευση Αλλαγών";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deleteGrade(idToRemove) {
            if(confirm("Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μάθημα;")) {
                let gradesList = JSON.parse(localStorage.getItem("myGrades")) || [];
                gradesList = gradesList.filter(entry => entry.id !== idToRemove);
                localStorage.setItem("myGrades", JSON.stringify(gradesList));
                loadGrades();
            }
        }

        function loadGrades() {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";

            let gradesList = JSON.parse(localStorage.getItem("myGrades")) || [];
            
            // Ταξινόμηση ανά εξάμηνο
            gradesList.sort((a, b) => a.semester - b.semester);

            let displayList = gradesList;
            if (currentSemesterFilter !== 'all') {
                displayList = displayList.filter(entry => entry.semester === currentSemesterFilter);
            }

            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            displayList = displayList.filter(entry => entry.name.toLowerCase().includes(searchQuery));

            let passedSum = 0; 
            let passedCount = 0;
            displayList.forEach(entry => {
                if (entry.grade >= 5) {
                    passedSum += entry.grade;
                    passedCount++;            
                }
            });

            if (passedCount > 0) {
                const average = passedSum / passedCount;
                document.getElementById("averageSpan").innerText = average.toFixed(2);
            } else {
                document.getElementById("averageSpan").innerText = "-";
            }

            displayList.forEach(entry => {
                let gradeClass = entry.grade >= 5 ? "grade-pass" : "grade-fail";
                let row = `<tr>
                                <td>${entry.name}</td>
                                <td class="${gradeClass}">${entry.grade}</td>
                                <td>${entry.semester}</td>
                                <td>
                                    <button class="edit-btn" onclick="editGrade(${entry.id})">Επεξεργασία</button>
                                    <button class="delete-btn" onclick="deleteGrade(${entry.id})">Διαγραφή</button>
                                </td>
                            </tr>`;
                tableBody.innerHTML += row;
            });
        }

        // --- ΣΥΝΑΡΤΗΣΕΙΣ BACKUP/RESTORE ---
        
        function exportToFile() {
            const data = localStorage.getItem("myGrades");
            if (!data || data === "[]") {
                alert("Δεν υπάρχουν βαθμοί για αποθήκευση!");
                return;
            }
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "vathmoi_backup.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        if(confirm("Προσοχή! Η φόρτωση θα αντικαταστήσει τους τρέχοντες βαθμούς. Συνέχεια;")) {
                            localStorage.setItem("myGrades", JSON.stringify(data));
                            loadGrades();
                            alert("Οι βαθμοί φορτώθηκαν επιτυχώς!");
                        }
                    } else {
                        alert("Το αρχείο δεν έχει τη σωστή μορφή.");
                    }
                } catch (err) {
                    alert("Σφάλμα κατά την ανάγνωση του αρχείου.");
                }
            };
            reader.readAsText(file);
        }

        // Back to Top
        window.onscroll = function() {
            const topBtn = document.getElementById("backToTop");
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                topBtn.style.display = "block";
            } else {
                topBtn.style.display = "none";
            }
        };

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
